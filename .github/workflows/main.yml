name: Build APK
on: 
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version Code (Must be a number - e.g., 5)'
        required: true
        default: '1'
      version_name:
        description: 'Version Name (e.g., 2.2.1)'
        required: true
        default: '1.0.0'

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm init -y
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest @capacitor/assets @capacitor/local-notifications@latest
          
          mkdir -p www
          [ -f "index.html" ] && cp index.html www/
          
          npx cap init "Momentum" "com.harshitnimje.momentum" --web-dir www
          npx cap add android
          
          # Manually injecting the versions you typed in the GitHub popup
          sed -i "s/versionCode 1/versionCode ${{ github.event.inputs.version_code }}/" android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "${{ github.event.inputs.version_name }}"/' android/app/build.gradle
          
          if [ -f "assets/icon-foreground.png" ] && [ -f "assets/icon-background.png" ]; then
            echo "✅ Adaptive icon assets detected"
            npx capacitor-assets generate --android
          else
            echo "⚠️ Icons missing, using default"
          fi
          
          npx cap sync android
          cd android && ./gradlew clean assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          # Naming the zip file based on the version name you entered
          name: Momentum-V${{ github.event.inputs.version_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
