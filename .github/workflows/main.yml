name: Build APK
on: 
  workflow_dispatch: # Only builds when you manually click 'Run'

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm init -y
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest @capacitor/assets
          
          mkdir -p www
          [ -f "index.html" ] && cp index.html www/ # Copying instead of moving to avoid errors
          
          npx cap init "Momentum" "com.harshitnimje.momentum" --web-dir www
          npx cap add android
          
          # This line fixes your 'Uninstall' issue by bumping the version automatically
          sed -i 's/versionCode 1/versionCode ${{ github.run_number }}/' android/app/build.gradle
          sed -i 's/versionName "2.1"/versionName "2.1.${{ github.run_number }}"/' android/app/build.gradle
          
          if [ -f "assets/icon-foreground.png" ] && [ -f "assets/icon-background.png" ]; then
            echo "✅ Adaptive icon assets detected"
            npx capacitor-assets generate --android
          else
            echo "⚠️ Icons missing, using default"
          fi
          
          npx cap sync android
          cd android && ./gradlew clean assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Build-B${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
