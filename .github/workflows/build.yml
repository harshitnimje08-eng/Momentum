name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install and Build
        run: |
          # 1. Start fresh
          npm init -y
          
          # 2. Install LATEST Capacitor
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest
          
          # 3. Handle folders
          mkdir -p www
          [ -f "index.html" ] && mv index.html www/
          
          # 4. Initialize with specific latest version flags
          npx cap init "MyApp" "com.test.app" --web-dir www
          npx cap add android
          
          # 5. Sync and build (using the latest gradle wrapper)
          npx cap sync android
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
